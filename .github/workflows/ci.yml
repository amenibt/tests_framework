name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ui tests/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: 'ui tests'

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
        working-directory: 'ui tests'

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}
        working-directory: 'ui tests'
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: ui tests/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: ui tests/test-results/
          retention-days: 7

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: ui tests/allure-results/
          retention-days: 7

  generate-allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Setup Java (required for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz
          tar -zxvf allure-2.25.0.tgz
          sudo mv allure-2.25.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      - name: Count test results
        id: count_tests
        run: |
          total=$(find allure-results -name "*.json" | wc -l)
          echo "total_tests=$total" >> $GITHUB_OUTPUT
          echo "Found $total test result files"

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report
          echo "## 📊 Allure Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Report generated successfully with ${{ steps.count_tests.outputs.total_tests }} test results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Artifacts Available:" >> $GITHUB_STEP_SUMMARY
          echo "- **Allure Report** (30 days retention)" >> $GITHUB_STEP_SUMMARY
          echo "- **Playwright HTML Reports** per browser (14 days)" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Results** per browser (7 days)" >> $GITHUB_STEP_SUMMARY

      - name: Add report metadata
        run: |
          cat > allure-report/summary.txt << EOF
          Build: ${{ github.run_number }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Triggered by: ${{ github.event_name }}
          Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-report
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Allure Report - Build #${{ github.run_number }}'

      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runNumber = context.runNumber;
            const reportUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/allure-report/`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Test Results - Build #${runNumber}\n\n✅ Allure Report: [View Report](${reportUrl})\n\n📦 Download artifacts from the [Actions run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
